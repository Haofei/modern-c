name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without a leading v"
        required: true
        default: "0.7.0-dev"
      dry_run:
        description: "Build artifacts without creating or updating a GitHub Release"
        required: true
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release-artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      MC_LLVM_MAJOR: "18"
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # mlugg/setup-zig@v2
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
      # actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install release qualification tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18 qemu-system-arm qemu-system-misc qemu-system-x86
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="$GITHUB_REF_NAME"
            DRY_RUN=false
          else
            VERSION="${{ inputs.version }}"
            TAG="v$VERSION"
            DRY_RUN="${{ inputs.dry_run }}"
          fi
          if [[ "$VERSION" == v* ]]; then
            echo "version must not include a leading v" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$VERSION" == *-dev* ]]; then
            echo "tag-triggered releases must not publish development versions: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Run release workflow qualification checks
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          source_version="$(sed -nE 's/^[[:space:]]*\.version = "([^"]+)",/\1/p' build.zig.zon)"
          test -n "$source_version"
          if [[ "$source_version" != "${{ steps.meta.outputs.version }}" ]]; then
            echo "release version ${{ steps.meta.outputs.version }} does not match build.zig.zon $source_version" >&2
            exit 1
          fi
          zig build preflight
          zig build release-metadata-test package-release-test release-safe-install-test
          release_m0_log="$RUNNER_TEMP/release-m0.log"
          MC_REQUIRE_TOOLS=1 zig build m0 2>&1 | tee "$release_m0_log"
          if grep -n '^SKIP:' "$release_m0_log"; then
            echo "release m0 skipped at least one gate" >&2
            exit 1
          fi
          python3 tools/ci/pass-gates.py assert --tier ci-m0-pass --log "$release_m0_log"
          zig build -Dversion="${{ steps.meta.outputs.version }}" install --prefix zig-out/version-check
          test "$(zig-out/version-check/bin/mcc --version)" = "mcc ${{ steps.meta.outputs.version }}"
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Build ReleaseSafe release tarballs
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/ci/package-release.py release \
            --version "${{ steps.meta.outputs.version }}" \
            --commit "$GITHUB_SHA" \
            --out-dir zig-out/release \
            --targets x86_64-linux-musl aarch64-linux-musl x86_64-macos aarch64-macos

      - name: Verify release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd zig-out/release
          sha256sum -c SHA256SUMS

      - name: Package VS Code extension
        shell: bash
        working-directory: editors/vscode
        run: |
          set -euo pipefail
          npm ci
          npm run package

      - name: Stage VS Code extension release asset
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsix=(editors/vscode/*.vsix)
          if (( ${#vsix[@]} != 1 )); then
            printf 'expected exactly one VSIX, found %d\n' "${#vsix[@]}" >&2
            exit 1
          fi
          cp "${vsix[0]}" zig-out/release/
          (
            cd zig-out/release
            sha256sum "$(basename "${vsix[0]}")" >> SHA256SUMS
          )

      - name: Verify release checksum subjects
        shell: bash
        run: |
          set -euo pipefail
          cd zig-out/release
          while read -r digest filename; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "invalid SHA256 digest in SHA256SUMS: $digest" >&2
              exit 1
            fi
            if [[ -z "$filename" || "$filename" == */* || ! -f "$filename" ]]; then
              echo "SHA256SUMS subject is not a file in zig-out/release: $filename" >&2
              exit 1
            fi
          done < SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Attest release artifact provenance
        # actions/attest@v4
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-checksums: zig-out/release/SHA256SUMS

      - name: Upload release artifacts
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mcc-release-${{ steps.meta.outputs.version }}
          path: |
            zig-out/release/*.tar.gz
            zig-out/release/SHA256SUMS
            zig-out/release/*inventory*.json
            zig-out/release/*sbom*.json
            zig-out/release/*.vsix
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v') && steps.meta.outputs.dry_run != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; release assets are immutable" >&2
            exit 1
          fi
          gh release create "$tag" --title "$tag" --notes "mcc $version"
          gh release upload "$tag" \
            zig-out/release/*.tar.gz \
            zig-out/release/SHA256SUMS \
            zig-out/release/*inventory*.json \
            zig-out/release/*sbom*.json \
            zig-out/release/*.vsix
