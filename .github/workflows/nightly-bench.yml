name: nightly-bench

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qemu-benches:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      MC_LLVM_MAJOR: "18"
      MC_REQUIRE_TOOLS: "1"
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # mlugg/setup-zig@v2
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
      - name: Install benchmark toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18 qemu-system-arm qemu-system-misc qemu-system-x86
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
      - name: Print tool versions
        run: |
          zig version
          clang --version
          llvm-as --version
          llc --version
          opt --version
          qemu-system-riscv64 --version
      - name: Preflight pinned tools
        run: zig build preflight
      - name: Run nightly QEMU benchmarks
        run: |
          python3 tools/ci/nightly-bench.py run \
            --baseline tools/bench/nightly-baseline.tsv \
            --output zig-out/nightly-bench-results.tsv \
            --log-dir zig-out/nightly-bench-logs
      - name: Upload benchmark results
        if: always()
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-bench-results
          path: |
            zig-out/nightly-bench-results.tsv
            zig-out/nightly-bench-logs/
          if-no-files-found: warn
