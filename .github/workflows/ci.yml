name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      MC_LLVM_MAJOR: "18"
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install integration-test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18 qemu-system-arm qemu-system-misc qemu-system-x86
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
      - name: Print tool versions
        run: |
          zig version
          clang --version
          llvm-as --version
          llc --version
          opt --version
          qemu-system-riscv64 --version
          qemu-system-aarch64 --version
          qemu-system-x86_64 --version
      - name: Preflight the QEMU toolchain (fail fast with a clear report)
        run: zig build preflight
      - name: Run full milestone gate without skips
        shell: bash
        # MC_REQUIRE_TOOLS=1 makes a missing tool FAIL at the gate (not silently SKIP), instead of
        # relying on the implicit CI env var. The grep is then belt-and-suspenders.
        run: |
          set -o pipefail
          MC_REQUIRE_TOOLS=1 zig build m0 2>&1 | tee m0.log
          if grep -n '^SKIP:' m0.log; then
            echo "m0 skipped at least one gate in CI" >&2
            exit 1
          fi
          # Positively assert the async QEMU gates RAN on both backends. The list is
          # read from build/tiers.zig, and the verifier also proves each name is an
          # m0 dependency, so CI cannot silently drift away from the tier.
          python3 tools/ci/pass-gates.py assert --tier ci-m0-pass --log m0.log

  docker:
    # Keeps the cross-platform dev image (Dockerfile / docker-compose.yml) honest: the image
    # must build and the host-only inner-loop gate must pass inside it. The dev image GUARANTEES
    # clang/ld.lld/llc/qemu, so it is also the reproducible place to run the C+LLVM QEMU async
    # gates as REAL gates — independent of whatever the bare runner's apt happened to install.
    runs-on: ubuntu-24.04
    env:
      MC_LLVM_MAJOR: "18"
    steps:
      - uses: actions/checkout@v4
      - name: Build the dev image
        run: docker compose build dev
      - name: Run the fast gate in the container
        run: docker compose run --rm dev zig build fast
      - name: Preflight the toolchain inside the container
        run: docker compose run --rm dev zig build preflight
      - name: Run the RISC-V QEMU/OpenSBI validation surrogate in the container (no skips)
        run: |
          docker compose run --rm dev bash -lc '
            set -euo pipefail
            MC_REQUIRE_TOOLS=1 zig build riscv-qemu-validation 2>&1 | tee riscv-qemu-validation.log
            if grep -n "^SKIP:" riscv-qemu-validation.log; then
              echo "riscv-qemu-validation skipped at least one gate in CI" >&2
              exit 1
            fi
            python3 tools/ci/pass-gates.py assert --tier riscv-qemu-validation --log riscv-qemu-validation.log
          '
      - name: Run the async C+LLVM QEMU gates in the container (no skips)
        run: |
          docker compose run --rm dev bash -lc '
            set -euo pipefail
            for name in $(python3 tools/ci/pass-gates.py names --tier ci-m0-pass); do
              MC_REQUIRE_TOOLS=1 zig build "$name"
            done
          '
