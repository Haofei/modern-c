name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install integration-test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm qemu-system-arm qemu-system-misc qemu-system-x86
      - name: Print tool versions
        run: |
          zig version
          clang --version
          llvm-as --version
          llc --version
          opt --version
          qemu-system-riscv64 --version
          qemu-system-aarch64 --version
          qemu-system-x86_64 --version
      - name: Preflight the QEMU toolchain (fail fast with a clear report)
        run: zig build preflight
      - name: Run full milestone gate without skips
        shell: bash
        # MC_REQUIRE_TOOLS=1 makes a missing tool FAIL at the gate (not silently SKIP), instead of
        # relying on the implicit CI env var. The grep is then belt-and-suspenders.
        run: |
          set -o pipefail
          MC_REQUIRE_TOOLS=1 zig build m0 2>&1 | tee m0.log
          if grep -n '^SKIP:' m0.log; then
            echo "m0 skipped at least one gate in CI" >&2
            exit 1
          fi
          # Positively assert the async QEMU gates RAN on both backends — a no-SKIP check alone
          # would not catch a gate silently dropped from the m0 aggregate. Each prints "PASS: <name>".
          for g in async-test async-irq-test async-cancel-test async-pollmany-test \
                   async-future-test async-select-test async-agent-test async-blk-test \
                   async-net-test agent-async-api-test qjs-cancel-test qjs-agent-smoke-test \
                   qjs-cancel-edges-test; do
            for name in "$g" "llvm-$g"; do
              if ! grep -q "^PASS: $name " m0.log; then
                echo "expected gate '$name' to run and pass in m0, but no 'PASS: $name' line was found" >&2
                exit 1
              fi
            done
          done

  docker:
    # Keeps the cross-platform dev image (Dockerfile / docker-compose.yml) honest: the image
    # must build and the host-only inner-loop gate must pass inside it. The dev image GUARANTEES
    # clang/ld.lld/llc/qemu, so it is also the reproducible place to run the C+LLVM QEMU async
    # gates as REAL gates — independent of whatever the bare runner's apt happened to install.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the dev image
        run: docker compose build dev
      - name: Run the fast gate in the container
        run: docker compose run --rm dev zig build fast
      - name: Preflight the toolchain inside the container
        run: docker compose run --rm dev zig build preflight
      - name: Run the RISC-V QEMU/OpenSBI validation surrogate in the container (no skips)
        run: |
          docker compose run --rm dev bash -lc '
            set -euo pipefail
            MC_REQUIRE_TOOLS=1 zig build riscv-qemu-validation 2>&1 | tee riscv-qemu-validation.log
            if grep -n "^SKIP:" riscv-qemu-validation.log; then
              echo "riscv-qemu-validation skipped at least one gate in CI" >&2
              exit 1
            fi
            for name in \
              smode-timer-test llvm-smode-timer-test \
              smode-plic-test llvm-smode-plic-test \
              smode-plic-multishot-test llvm-smode-plic-multishot-test \
              blk-smode-test llvm-blk-smode-test \
              net-smode-test llvm-net-smode-test \
              blk-smode-irq-test llvm-blk-smode-irq-test \
              net-smode-irq-test llvm-net-smode-irq-test \
              net-smode-rx-irq-test llvm-net-smode-rx-irq-test \
              qjs-smode-confined-test llvm-qjs-smode-confined-test \
              qjs-smode-agent-test llvm-qjs-smode-agent-test \
              qjs-realtool-test llvm-qjs-realtool-test \
              qjs-nettool-test llvm-qjs-nettool-test \
              qjs-net-realtool-test llvm-qjs-net-realtool-test \
              qjs-smode-net-irq-tool-test llvm-qjs-smode-net-irq-tool-test \
              qjs-smode-blk-irq-tool-test llvm-qjs-smode-blk-irq-tool-test; do
              if ! grep -q "^PASS: $name " riscv-qemu-validation.log; then
                echo "expected gate $name to run and pass in riscv-qemu-validation" >&2
                exit 1
              fi
            done
          '
      - name: Run the async C+LLVM QEMU gates in the container (no skips)
        run: |
          docker compose run --rm dev bash -lc '
            set -euo pipefail
            for g in async-test async-irq-test async-cancel-test async-pollmany-test \
                     async-future-test async-select-test async-agent-test async-blk-test \
                     async-net-test agent-async-api-test qjs-cancel-test qjs-agent-smoke-test \
                     qjs-cancel-edges-test; do
              MC_REQUIRE_TOOLS=1 zig build "$g"
              MC_REQUIRE_TOOLS=1 zig build "llvm-$g"
            done
          '
